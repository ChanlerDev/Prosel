services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: prosel
      POSTGRES_PASSWORD: prosel
      POSTGRES_DB: prosel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prosel -d prosel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      APP_VERSION: dev
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: prosel
      DB_PASSWORD: prosel
      DB_NAME: prosel
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      JWT_SECRET: dev-secret-change-me
      JWT_ISSUER: prosel
      ACCESS_TOKEN_MINUTES: 15
      REFRESH_TOKEN_HOURS: 168
      PASSWORD_BCRYPT_COST: 12
      AI_PROVIDER: ""
      AI_API_KEY: ""
      AI_BASE_URL: https://api.openai.com/v1
      AI_MODEL: gpt-4o-mini
      AI_TIMEOUT_SECONDS: 30
      MIGRATIONS_DIR: migrations
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      API_BASE_URL: http://backend:8080/api/v1
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
